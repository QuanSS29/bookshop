<!DOCTYPE html>
<html lang="vi">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Bookshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <div class="login-page">
        <div class="login-container">
            <h1>Bookshop</h1>
            <p class="subtitle">Truy cập để mua sắm và khám phá hàng ngàn cuốn sách hay</p>
            <form method="post" class="login-form">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Email</label>  {# input name vẫn là "username" để view nhận #}
                    <input
                        type="email"
                        id="username"
                        name="username"
                        required
                        autofocus
                        placeholder="Nhập địa chỉ email"
                        value="{{ request.POST.username }}"  {# giữ lại email nếu login lỗi #}
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="Nhập mật khẩu"
                    >
                </div>

                <button type="submit">Đăng nhập</button>

                <div class="extra-links">
                    <a href="{% url 'books:home' %}">Về trang chủ</a>
                    <span>|</span>
                    <a href="#">Quên mật khẩu?</a>
                </div>

                <div class="register-link">
                    Chưa có tài khoản? <a href="#">Đăng ký ngay</a>
                </div>
            </form>
        </div>
    </div>

    {% include 'partials/messages.html' %}

</body>
</html>
