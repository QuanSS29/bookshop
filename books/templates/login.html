<!DOCTYPE html>
<html lang="vi">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Bookshop</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="auth-page">
    <div class="auth-container">
        <span class="auth-brand">Bookshop</span>
        <h1 class="auth-title">Chào mừng trở lại</h1>
        <p class="auth-subtitle">Đăng nhập để mua sắm và khám phá hàng ngàn cuốn sách hay</p>

        <form method="POST" class="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Email <span class="req">*</span></label>
                <input type="email"
                       id="username"
                       name="username"
                       required autofocus
                       placeholder="Nhập địa chỉ email"
                       value="{{ request.POST.username }}">
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu <span class="req">*</span></label>
                <input type="password"
                       id="password"
                       name="password"
                       required
                       placeholder="Nhập mật khẩu">
            </div>

            <button type="submit" class="btn-auth">Đăng nhập</button>
        </form>

        <div class="auth-links">
            Chưa có tài khoản?
            <a href="{% url 'books:register' %}">Đăng ký ngay</a>
            <span class="sep">·</span>
            <a href="{% url 'books:home' %}">Về trang chủ</a>
        </div>
    </div>
</div>

{% include 'partials/messages.html' %}

</body>
</html>
