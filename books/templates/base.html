{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bookshop{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/master.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

{% include 'includes/header.html' %}

{% block content %}{% endblock %}

{% include 'includes/footer.html' %}
{% include 'partials/messages.html' %}

{% block extra_js %}{% endblock %}




</body>

<script>
$(document).on('submit', 'form[action*="/cart/add/"]', function(e) {
    e.preventDefault();
    const form = $(this);

    $.ajax({
        url:    form.attr('action'),
        method: 'POST',
        data:   form.serialize(),
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        success: function(res) {
            toastr.success(res.message);
        },
        error: function() {
            toastr.error('Có lỗi xảy ra, thử lại nhé!');
        }
    });
});
</script>
</html>
